- create:
    - ~/.config/qtile
    - ~/.config/dunst
    - ~/.config/rofi

- link:
    ~/.config/qtile/:
      path: tiling/qtile/**
      glob: true

    ~/.config/picom.conf: tiling/picom.conf
    ~/.xprofile: tiling/.xprofile
    ~/.config/dunst/dunstrc: tiling/dunstrc
    ~/.config/rofi/config.rasi: tiling/rofi.rasi
